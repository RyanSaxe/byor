id: python.no-importlib
language: Python
severity: warning
message: Avoid importlib's dynamic import machinery in Python code.
rule:
  any:
    - all:
        - pattern: import importlib
        - not:
            pattern: import importlib.$SUB
    - all:
        - pattern: import importlib as $ALIAS
        - not:
            pattern: import importlib.$SUB as $ALIAS
    - pattern: from importlib import import_module
    - pattern: from importlib import import_module as $ALIAS
    - pattern: from importlib import reload
    - pattern: from importlib import reload as $ALIAS
metadata:
  byor:
    rationale: >
      Dynamic module loading (import_module, reload, the bare importlib module)
      makes imports harder for agents, type checkers, linters, and reviewers to
      reason about. importlib.resources and importlib.metadata are static,
      legitimate stdlib APIs for package data and versions, so they stay
      allowed.
    agent_prompt: >
      Do not use importlib's dynamic import machinery (import_module, reload,
      or the bare importlib module) here. Prefer explicit top-level imports,
      including normal try/except import fallbacks for optional
      standard-library support. importlib.resources and importlib.metadata are
      fine. If truly dynamic plugin loading is required, ask for review before
      adding an exception.
    tags:
      - python
      - style-guide
      - greenfield
