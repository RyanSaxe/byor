id: python.require-class-attribute-annotations
language: Python
severity: warning
message: Class attributes should have explicit type annotations.
rule:
  all:
  - pattern:
      context: |
        class C:
            $FIELD = $VALUE
      selector: expression_statement
  - inside:
      kind: block
      inside:
        kind: class_definition
        field: body
        # Enum members must not be annotated: ty flags an annotated member as
        # invalid-enum-member-annotation, so enum class bodies are exempt.
        not:
          has:
            field: superclasses
            has:
              regex: ^(enum\.)?(Enum|IntEnum|StrEnum|Flag|IntFlag)$
  - not:
      inside:
        kind: function_definition
        stopBy: end
metadata:
  byor:
    rationale: >
      Class-level attributes are part of the class contract. Annotating them
      makes state and constants visible to readers and type checkers. Enum
      bodies are exempt because annotating an enum member is a type error.
    agent_prompt: >
      Add an explicit annotation to this class attribute, or move the value to a
      local variable if it is not intended to be class state. Do not guess
      ClassVar or instance semantics just to satisfy this rule; let the type
      checker validate the chosen annotation. Shapes that cannot legally carry
      an annotation, such as tuple unpacking (x, y = 1, 2) or chained assignment
      (a = b = 0), need restructuring into separate annotated assignments
      instead.
    tags:
    - python
    - typing
    - style-guide
    - greenfield
