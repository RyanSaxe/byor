id: python.no-exec
language: Python
severity: error
message: Do not use exec; dynamic code execution is unsafe.
rule:
  any:
    - pattern: exec($$$ARGS)
    - pattern: builtins.exec($$$ARGS)
metadata:
  byor:
    rationale: >
      exec executes arbitrary Python code and makes behavior hard to audit,
      test, and secure.
    agent_prompt: >
      Replace exec with explicit functions, dispatch tables, generated files
      checked into the build process, or a safer parser for the data format.
    tags:
      - python
      - security
