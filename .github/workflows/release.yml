name: Release

# Publishes to PyPI when a GitHub Release is published. To cut a release:
# bump the version (`uv version --bump <part>`), commit, then publish a Release
# with tag `vX.Y.Z` matching pyproject.toml.
#
# One-time setup before the first release:
#   1. Register a pending Trusted Publisher at
#      https://pypi.org/manage/account/publishing/ — project `byor`, owner
#      `RyanSaxe`, repo `byor`, workflow `release.yml`, environment `pypi`.
#   2. Create a GitHub Environment named `pypi` (Settings -> Environments).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted Publishing exchanges this OIDC token with PyPI — no API token.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked  # ast-grep ships as the ast-grep-cli dependency

      - name: Verify the release tag matches the package version
        run: |
          version="$(uv version --short --color never)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Release tag '$tag' does not match pyproject version '$version'." >&2
            echo "Bump with 'uv version --bump <part>', commit, then tag v$version." >&2
            exit 1
          fi

      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest

      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
