name: Release

# One-click release: trigger from the Actions tab and pick the version part to
# bump. This job runs the gates, bumps the version, publishes to PyPI, pushes the
# "chore: release vX.Y.Z" commit to main, and creates a GitHub Release with
# generated notes. Nothing to tag or publish by hand.
#
# One-time setup (already done for byor):
#   1. Register a Trusted Publisher at
#      https://pypi.org/manage/account/publishing/ — project `byor`, owner
#      `RyanSaxe`, repo `byor`, workflow `release.yml`, environment `pypi`.
#   2. Create a GitHub Environment named `pypi` (Settings -> Environments).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to bump
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # push the version-bump commit and create the release
      id-token: write  # Trusted Publishing exchanges this OIDC token with PyPI
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for generated release notes
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked  # ast-grep ships as the ast-grep-cli dependency

      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest

      - name: Bump version
        run: |
          uv version --bump ${{ inputs.bump }}
          echo "VERSION=$(uv version --short --color never)" >> "$GITHUB_ENV"

      - run: uv build

      # Publish before pushing: a failed upload leaves main untouched and the run
      # re-runnable, so the PyPI version is only ever consumed on success.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Push the version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v$VERSION"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v$VERSION" --generate-notes --title "v$VERSION"
