name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked  # ast-grep ships as the ast-grep-cli dependency
      - run: uv run scripts/sync_version.py --check
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest

  # Coverage runs on one cell so the threshold is deterministic: byor has
  # platform-specific branches that skew per-OS coverage.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest --cov=byor --cov-report=term-missing --cov-fail-under=90

  # The packaged agent integrations (src/byor/data/agents/*.ts) are real
  # TypeScript sources, not opaque strings: prettier and tsc must pass so a
  # formatting or type break in the shipped plugins fails CI.
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes prettier@3.6.2 --check "src/byor/data/**/*.ts"
      - run: npx --yes -p typescript@5.9.3 tsc -p tsconfig.json

  # byor eats its own dogfood: its committed project rules gate its CI.
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ast-grep scan --error
      # Every project rule's valid/invalid behavior is pinned by the samples in
      # .byor/rule-tests, so a rule edit that changes what fires fails CI.
      - run: uv run ast-grep test -c sgconfig.yml --skip-snapshot-tests
      # The example rules are validated against their samples so docs can't
      # drift from the tool. --skip-snapshot-tests enforces valid/invalid match
      # expectations without committing snapshot files.
      - run: uv run ast-grep test -c examples/sgconfig.yml --skip-snapshot-tests
