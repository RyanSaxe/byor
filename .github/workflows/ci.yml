name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked  # ast-grep ships as the ast-grep-cli dependency
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest

  # Coverage runs on one cell so the threshold is deterministic: byor has
  # platform-specific branches that skew per-OS coverage.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest --cov=byor --cov-report=term-missing --cov-fail-under=90

  # byor eats its own dogfood: its committed project rules gate its CI.
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ast-grep scan --error
      # The example rules are validated against their samples so docs can't
      # drift from the tool. --skip-snapshot-tests enforces valid/invalid match
      # expectations without committing snapshot files.
      - run: uv run ast-grep test -c examples/sgconfig.yml --skip-snapshot-tests
