# Managed by BYOR. Manual edits may be overwritten.
repos:
  - repo: local
    hooks:
      - id: byor-ast-grep
        name: ast-grep scan
        entry: uvx --from ast-grep-cli==0.42.3 ast-grep scan --error
        language: system
      - id: byor-ruff
        name: ruff
        entry: uv run .byor/scripts/ruff.sh
        language: system
        files: \.(py|pyi)$
      - id: byor-ty
        name: ty
        entry: uv run ty check --output-format concise --no-progress --color never --error all
        language: system
        files: \.(py|pyi)$
      - id: byor-no-suppression-comments
        name: no-suppression-comments
        entry: uv run .byor/scripts/no-suppression-comments.py
        language: system
        files: \.(py|pyi)$
      - id: byor-module-contract
        name: module-contract
        entry: uv run .byor/scripts/module-contract.py
        language: system
        files: \.(py|pyi)$
      - id: byor-no-thin-docstrings
        name: no-thin-docstrings
        entry: uv run .byor/scripts/no-thin-docstrings.py
        language: system
        files: \.(py|pyi)$
