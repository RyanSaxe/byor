# Demonstrates: relational rules — composing `any`, `all`, and the positional
# and structural operators that ast-grep adds on top of a bare pattern. A simple
# pattern cannot express "a call/yield-from that is the only statement in a
# function"; this rule can, by combining three conditions:
#
#   1. `any`     — the statement is a call in any pass-through form (returned,
#                  awaited, bare expression, or `yield from`).
#   2. `nthChild` — the call is the function body's only real statement. The
#                  first branch matches a lone statement; the second tolerates a
#                  leading docstring (`follows` an expression_statement holding a
#                  string) so documented one-liners still trip.
#   3. `inside`  — the statement is inside a block that is inside a
#                  function_definition's body, so module-level calls are exempt.
#
# `nthChild`'s `reverse: true` counts from the end, so "first and also last"
# means "the only one."
id: no-routing-functions
language: Python
severity: warning
message: Do not create functions whose only behavior is routing to another call.
rule:
  all:
    - any:
        - pattern: return $CALLEE($$$ARGS)
        - pattern: return await $CALLEE($$$ARGS)
        - pattern:
            context: $CALLEE($$$ARGS)
            selector: expression_statement
        - pattern:
            context: await $CALLEE($$$ARGS)
            selector: expression_statement
        - pattern:
            context: yield from $CALLEE($$$ARGS)
            selector: expression_statement
    - any:
        - all:
            - nthChild: 1
            - nthChild:
                position: 1
                reverse: true
        - all:
            - nthChild: 2
            - nthChild:
                position: 1
                reverse: true
            - follows:
                kind: expression_statement
                has:
                  kind: string
    - inside:
        kind: block
        inside:
          kind: function_definition
          field: body
metadata:
  byor:
    rationale: >
      A function that only forwards to another call adds indirection without
      adding behavior. Renaming variables, reordering arguments, or adding
      defaults is still routing unless the function owns meaningful logic or a
      real boundary.
    agent_prompt: >
      Remove this routing function and call the underlying implementation
      directly. If the function must exist as a public API or integration
      boundary, add real boundary behavior such as validation, translation,
      authorization, retry policy, error handling, or instrumentation. Do not
      preserve a wrapper whose only effect is changing argument order, defaults,
      or names.
    tags:
      - python
      - design
      - style-guide
      - greenfield
